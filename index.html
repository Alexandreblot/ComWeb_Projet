<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Simplifiée - Projet CIR2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-orange mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">UmaShop</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Électronique</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Maison</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sport</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="row">
            
            <section class="col-md-9">
                
                <div id="admin-form" class="card mb-4 d-none">
                    <div class="card-body">
                        <h5 class="card-title">Ajouter un produit (Admin)</h5>
                        <form>
                            <input type="text" class="form-control mb-2" placeholder="Nom du produit">
                            <textarea class="form-control mb-2" placeholder="Description"></textarea>
                            <button type="submit" class="btn btn-primary">Enregistrer</button>
                        </form>
                    </div>
                </div>

                <div class="mb-3">
                    <select class="form-select w-auto" onchange="requestProducts(this.value)">
                        <option value="">Toutes les catégories</option>
                        <option value="Peluche">Peluches</option>
                        <option value="Accessoire">Accessoires</option>
                    </select>
                </div>

                
            <h2 class="mb-3">Notre Catalogue</h2>
            <div class="row g-3" id="product-grid"></div>

            <hr class="my-5">

            <section id="product-detail" class="mt-4">
                <div class="card">
                    <div class="card-header bg-orange text-white">Détails du produit</div>
                        <div class="card-body" id="detail-content">
                            <p class="text-muted">Cliquez sur un produit ci-dessus pour voir ses avis.</p>
                        </div>
                    </div>
            </section>


            <aside class="col-md-3">
                <div class="card sticky-top" style="top: 20px;">
                    <div class="card-header bg-orange text-white">Support Client</div>
                    <div id="chat-box" class="card-body overflow-auto" style="height: 300px;">
                        <p class="text-muted small">Bienvenue sur le chat.</p>
                    </div>
                    <div class="card-footer">
                        <input type="text" class="form-control form-control-sm" placeholder="Votre message...">
                    </div>
                </div>
            </aside>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
